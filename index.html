<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acqua Cup - Categorias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f3f4f6;
        }

        .category-card {
            transition: all 0.3s ease;
            cursor: pointer;
            background-color: white; /* Todos começam brancos */
        }

        /* Hover no Desktop e Focus/Active no Mobile */
        .category-card:hover, 
        .category-card:active,
        .category-card:focus {
            background-color: #FFD700 !important;
            transform: translateY(-5px);
        }

        .category-card:hover i, 
        .category-card:active i,
        .category-card:focus i {
            color: white !important;
        }

        .category-card i {
            transition: color 0.3s ease;
            color: #FFD700;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            
            <div class="category-card p-6 rounded-2xl shadow-sm flex flex-col items-center text-center border border-gray-100" tabindex="0">
                <div class="mb-4">
                    <i class="fas fa-swimmer text-4xl"></i>
                </div>
                <h3 class="font-black text-gray-800 uppercase text-sm tracking-tighter">Pré-Mirim a Petiz</h3>
                <p class="text-xs text-gray-500 mt-1 font-bold">5 a 12 anos</p>
            </div>

            <div class="category-card p-6 rounded-2xl shadow-sm flex flex-col items-center text-center border border-gray-100" tabindex="0">
                <div class="mb-4">
                    <i class="fas fa-water text-4xl"></i>
                </div>
                <h3 class="font-black text-gray-800 uppercase text-sm tracking-tighter">Infantil a Juvenil</h3>
                <p class="text-xs text-gray-500 mt-1 font-bold">13 a 16 anos</p>
            </div>

            <div class="category-card p-6 rounded-2xl shadow-sm flex flex-col items-center text-center border border-gray-100" tabindex="0">
                <div class="mb-4">
                    <i class="fas fa-medal text-4xl"></i>
                </div>
                <h3 class="font-black text-gray-800 uppercase text-sm tracking-tighter">Junior a Sênior</h3>
                <p class="text-xs text-gray-500 mt-1 font-bold">17 a 24 anos</p>
            </div>

            <div class="category-card p-6 rounded-2xl shadow-sm flex flex-col items-center text-center border border-gray-100" tabindex="0">
                <div class="mb-4">
                    <i class="fas fa-trophy text-4xl"></i>
                </div>
                <h3 class="font-black text-gray-800 uppercase text-sm tracking-tighter">Master</h3>
                <p class="text-xs text-gray-500 mt-1 font-bold">25+ anos</p>
            </div>

        </div>
    </div>

</body>
</html>
